<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Background decorative elements -->
        <div class="ambient-glow glow-1"></div>
        <div class="ambient-glow glow-2"></div>
        <div class="ambient-glow glow-3"></div>

        <div class="ui-header">
            <div class="score-panel">
                <span class="label">SCORE</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="next-bubble-panel">
                <span class="label">NEXT</span>
                <div class="next-bubble-container">
                    <canvas id="nextBubbleCanvas" width="40" height="40"></canvas>
                </div>
            </div>
            <div class="check-in-panel">
                <button id="dailyCheckInBtn" class="small-btn">Check-in</button>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modalTitle">Game Over</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button id="restartBtn">Play Again</button>
            </div>
        </div>

        <!-- Web3 Paywall Modal -->
        <div id="web3Modal" class="modal">
            <div class="modal-content">
                <h2>Welcome to Web3 Bubble Shooter</h2>
                <p id="web3Status">Connect your wallet to play on Base.</p>
                <button id="connectWalletBtn">Connect Wallet</button>
                <button id="startGameBtn" class="hidden" style="background: linear-gradient(45deg, #0052ff, #00f2fe);">Start Game</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
